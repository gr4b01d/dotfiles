# Location for database
db_file            "/home/tagilla/.local/share/mpd/database"

# Logs to system journal
log_file           "/home/tagilla/.local/share/mpd/log"

# The music directory is by default the XDG directory, uncomment to amend and choose a different directory
music_directory    "/home/tagilla/Music"

# Uncomment to enable the functionalities
playlist_directory "/home/tagilla/.local/share/mpd/playlists"
pid_file           "/home/tagilla/.local/share/mpd/pid"
state_file         "/home/tagilla/.local/share/mpd/state"
sticker_file       "/home/tagilla/.local/share/mpd/sticker.sql"

# Uncomment to refresh the database whenever files in the music_directory are changed
auto_update "yes"

port "6600"

restore_paused "yes"
audio_output {
        type            "pulse"
        name            "pulse audio"
}

audio_output {
        type            "fifo"
        name            "my_fifo"
        path            "/tmp/mpd.fifo"
        format          "44100:16:2"
}



